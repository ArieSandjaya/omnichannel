version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "db/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        null_style: "ptr"
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "json"
            go_type: "encoding/json.RawMessage"
